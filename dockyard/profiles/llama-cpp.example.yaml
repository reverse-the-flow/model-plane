id: llama-cpp-example
name: llama.cpp Example
version: 1
model:
  id: local/example-gguf
  local_path: /mnt/Calliope/models/example.gguf
  source: user-selected
  quant: gguf
runtime:
  backend: llama_cpp
  image: ghcr.io/ggml-org/llama.cpp:server-cuda
  command: []
  args:
    - -m
    - /models/example.gguf
    - --host
    - 0.0.0.0
    - --port
    - "8080"
    - --ctx-size
    - "8192"
    - --n-gpu-layers
    - "999"
container:
  name: dockyard-llama-cpp-example
  host_port: 18080
  internal_port: 8080
  gpu: all
  volumes:
    - /mnt/Calliope/models:/models:ro
  env: {}
health:
  url: http://127.0.0.1:18080/health
